<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCTCC: VLSM Sandbox</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f7f0; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .sandbox-container { background: #fff; padding: 25px; border-radius: 10px; border: 3px solid #28a745; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 700px; width: 100%; }
        h1 { color: #28a745; margin-bottom: 20px; border-bottom: 2px solid #28a745; padding-bottom: 10px; }
        input[type="text"] { font-family: 'Courier New', monospace; font-size: 16px; padding: 10px; border: 2px solid #ddd; border-radius: 4px; width: 60px; text-align: center; }
        .result-box { margin-top: 20px; min-height: 40px; }
        .correct { color: #28a745; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sandbox-container">
        <h1>VLSM Validation Sandbox</h1>
        <p>Enter the CIDR notation (e.g., /24) for the <strong>R1 LAN</strong> network to host 50 hosts:</p>
        <div style="display: flex; gap: 10px; align-items: center;">
            <label>/</label>
            <input type="text" id="cidrInput" placeholder="??">
            <button onclick="checkCidr()" style="background-color: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Validate</button>
        </div>
        <div id="result" class="result-box"></div>
    </div>

    <script>
        function checkCidr() {
            const input = document.getElementById('cidrInput').value.trim();
            const res = document.getElementById('result');
            if (input === '26') {
                res.innerHTML = '<span class="correct">✓ Correct. /26 provides 62 hosts (2^6 - 2).</span>';
            } else if (input === '25' || input === '27') {
                res.innerHTML = '<span class="error">✗ Incorrect. Close, but check your subnet requirements.</span>';
            } else {
                res.innerHTML = '<span class="error">✗ Incorrect. Re-calculate the host requirement.</span>';
            }
        }
    </script>
</body>
</html>
