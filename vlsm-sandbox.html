<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCTCC: VLSM Triple-Validator</title>
    <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f7f0; color: #333; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 95vh; }
        .sandbox-container { background: #fff; padding: 30px; border-radius: 10px; border: 3px solid #28a745; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; z-index: 10; }
        h1 { color: #28a745; border-bottom: 2px solid #28a745; padding-bottom: 10px; margin-top: 0; }
        .instruction-box { background: #e8f5e9; padding: 15px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em; border-left: 5px solid #28a745; }
        .v-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        .v-label { flex: 2; font-weight: bold; }
        .v-input { flex: 1; text-align: center; }
        input[type="text"] { width: 60px; padding: 8px; border: 2px solid #ddd; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 1.1em; text-align: center; }
        .v-status { flex: 1; text-align: right; min-width: 100px; }
        .correct { color: #28a745; font-weight: bold; }
        .error { color: #e74c3c; font-weight: bold; }
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .btn-check { background: #28a745; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; font-size: 1.1em; }
        .btn-check:hover { background: #218838; }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="sandbox-container">
        <h1>VLSM Design Validator</h1>
        <div class="instruction-box">
            <strong>Network Block: 10.10.20.0/24</strong><br>
            Calculate the appropriate CIDR notation (e.g., /26) for each segment based on host requirements.
        </div>

        <div class="v-row">
            <div class="v-label">Main Office LAN (100 Hosts)</div>
            <div class="v-input"><input type="text" id="cidr1" placeholder="/??"></div>
            <div id="status1" class="v-status"></div>
        </div>

        <div class="v-row">
            <div class="v-label">Branch Office LAN (25 Hosts)</div>
            <div class="v-input"><input type="text" id="cidr2" placeholder="/??"></div>
            <div id="status2" class="v-status"></div>
        </div>

        <div class="v-row">
            <div class="v-label">Inter-Router Link (2 Hosts)</div>
            <div class="v-input"><input type="text" id="cidr3" placeholder="/??"></div>
            <div id="status3" class="v-status"></div>
        </div>

        <button class="btn-check" onclick="validateAll()">Verify Full VLSM Design</button>
        <div id="final-msg" style="text-align: center; margin-top: 20px; font-weight: bold;"></div>
    </div>

    <script>
        function validateAll() {
            const c1 = document.getElementById('cidr1').value.trim();
            const c2 = document.getElementById('cidr2').value.trim();
            const c3 = document.getElementById('cidr3').value.trim();
            
            let score = 0;

            // Check 1: 100 Hosts needs /25 (126 hosts)
            if (c1 === '/25' || c1 === '25') {
                document.getElementById('status1').innerHTML = '<span class="correct">✓ Correct</span>';
                score++;
            } else {
                document.getElementById('status1').innerHTML = '<span class="error">✗ Retry</span>';
            }

            // Check 2: 25 Hosts needs /27 (30 hosts)
            if (c2 === '/27' || c2 === '27') {
                document.getElementById('status2').innerHTML = '<span class="correct">✓ Correct</span>';
                score++;
            } else {
                document.getElementById('status2').innerHTML = '<span class="error">✗ Retry</span>';
            }

            // Check 3: 2 Hosts needs /30 (2 hosts)
            if (c3 === '/30' || c3 === '30') {
                document.getElementById('status3').innerHTML = '<span class="correct">✓ Correct</span>';
                score++;
            } else {
                document.getElementById('status3').innerHTML = '<span class="error">✗ Retry</span>';
            }

            if (score === 3) {
                document.getElementById('final-msg').innerHTML = '<span class="correct">Full VLSM Design Validated! Proceed to Scripting.</span>';
                triggerConfetti();
            }
        }

        function triggerConfetti() {
            const confettiSettings = { target: 'confetti-canvas', max: 150, props: ['circle', 'square'], colors: [[40, 167, 69],[33, 136, 56],[255, 255, 255]], clock: 35};
            const confetti = new ConfettiGenerator(confettiSettings);
            confetti.render();
            setTimeout(() => { confetti.clear(); }, 7000);
        }
    </script>
</body>
</html>
