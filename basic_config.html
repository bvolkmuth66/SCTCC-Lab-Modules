<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cisco Lab: Basic Configuration</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 1px solid #444; padding: 15px; min-height: 400px; background: #000; }
        .prompt { color: #00ff00; font-weight: bold; }
        input { background: transparent; border: none; color: #00ff00; outline: none; width: 70%; font-family: inherit; font-size: 1.1em; }
        .task { color: #00ccff; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .error { color: #ff0000; }
        .hint { color: #ffff00; }
    </style>
</head>
<body>
    <div class="terminal">
        <div id="display"></div>
        <div class="task" id="currentTask"></div>
        <div><span class="prompt">Router(config)#</span> <input type="text" id="userInput" autofocus onkeydown="process(event)"></div>
    </div>
    <script>
        const tasks = [
            {q: "Set hostname to R1", a: "hostname R1", h: "Use the hostname command."},
            {q: "Encrypt enable password to cisco", a: "enable secret cisco", h: "The secret keyword provides encryption."},
            {q: "Encrypt all plaintext passwords", a: "service password-encryption", h: "This is a global service command."},
            {q: "Verify current running configuration", a: "show running-config", h: "This displays the config in RAM."},
            {q: "Verify the hardware and version", a: "show version", h: "Provides hardware and software details."}
        ];
        let idx = 0, err = 0;
        function show() { document.getElementById("currentTask").innerText = "TASK: " + tasks[idx].q; }
        function process(e) {
            if (e.key === "Enter") {
                let val = e.target.value.trim().toLowerCase();
                let d = document.getElementById("display");
                d.innerHTML += "<div><span class='prompt'>Router(config)# </span>" + e.target.value + "</div>";
                if (val === tasks[idx].a.toLowerCase()) {
                    idx++; err = 0;
                    if (idx < tasks.length) { show(); } 
                    else { confetti(); d.innerHTML += "<div style='color:white'>MODULE COMPLETE</div>"; }
                } else {
                    err++;
                    if (err >= 3) { d.innerHTML += "<div class='hint'>HINT: " + tasks[idx].h + "</div>"; }
                    else { d.innerHTML += "<div class='error'>Invalid syntax.</div>"; }
                }
                e.target.value = "";
            }
        }
        show();
    </script>
</body>
</html>
