<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SCTCC: Syntax Checker</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #f0f5ff; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { background: #1e1e1e; padding: 25px; border-radius: 10px; border: 3px solid #004a99; box-shadow: 0 10px 20px rgba(0,0,0,0.5); width: 100%; max-width: 650px; color: #abb2bf; }
        .header { color: #c678dd; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #004a99; padding-bottom: 5px; }
        .prompt { color: #98c379; }
        input[type="text"] { background: transparent; border: none; color: #61afef; outline: none; font-family: inherit; font-size: 16px; width: 70%; }
        .result { margin-top: 10px; min-height: 24px; color: #abb2bf; font-style: italic;}
        .reset-btn { background: #004a99; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; float: right; font-size: 12px; font-family: 'Segoe UI', sans-serif;}
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            CLI Syntax Validator
            <button class="reset-btn" onclick="resetValidator()">Reset</button>
        </div>
        <div style="margin-bottom: 15px; color: #fff;">Task: Configure the device hostname to <strong>R1</strong>.</div>
        <div id="cliPrompt"><span class="prompt">Router(config)#</span> <input type="text" id="commandInput" autofocus onkeydown="validate(event)"></div>
        <div id="result" class="result"></div>
    </div>

    <script>
        function validate(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('commandInput').value.trim();
                const res = document.getElementById('result');
                if (input.toLowerCase() === 'hostname r1') {
                    res.innerHTML = '<span style="color:#98c379">✓ Success: Hostname set to R1.</span>';
                    document.getElementById('cliPrompt').innerHTML = '<span class="prompt">R1(config)#</span>';
                } else {
                    res.innerHTML = '<span style="color:#e06c75">✗ Syntax Error. Expected: hostname R1</span>';
                    document.getElementById('commandInput').value = "";
                }
            }
        }
        function resetValidator() { location.reload(); }
    </script>
</body>
</html>
