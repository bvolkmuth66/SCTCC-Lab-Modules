<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cisco Lab: Interface Configuration</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff00; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 1px solid #444; padding: 15px; min-height: 400px; background: #000; }
        input { background: transparent; border: none; color: #00ff00; outline: none; width: 70%; font-family: inherit; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="terminal">
        <div id="display"></div>
        <div id="currentTask" style="color:#00ccff; margin-bottom:10px;"></div>
        <div><span style="color:#00ff00; font-weight:bold">Router(config-if)#</span> <input type="text" id="userInput" autofocus onkeydown="process(event)"></div>
    </div>
    <script>
        const tasks = [
            {q: "Enter interface G0/0", a: "interface gigabitethernet 0/0", h: "Use the full interface name."},
            {q: "Assign IP 10.1.1.1 /24", a: "ip address 10.1.1.1 255.255.255.0", h: "Include the mask."},
            {q: "Activate interface", a: "no shutdown", h: "Negate the shutdown command."},
            {q: "Show summary of all interfaces", a: "show ip interface brief", h: "Lists status and addresses."},
            {q: "Show detailed interface stats", a: "show interfaces gigabitethernet 0/0", h: "Use the show interfaces keyword."}
        ];
        let idx = 0, err = 0;
        function show() { document.getElementById("currentTask").innerText = "TASK: " + tasks[idx].q; }
        function process(e) {
            if (e.key === "Enter") {
                let val = e.target.value.trim().toLowerCase();
                let d = document.getElementById("display");
                d.innerHTML += "<div><span style='color:#00ff00; font-weight:bold'>Router(config-if)# </span>" + e.target.value + "</div>";
                if (val === tasks[idx].a.toLowerCase()) {
                    idx++; err = 0;
                    if (idx < tasks.length) { show(); } else { confetti(); d.innerHTML += "<div style='color:white'>MODULE COMPLETE</div>"; }
                } else {
                    err++;
                    if (err >= 3) d.innerHTML += "<div style='color:#ffff00'>HINT: " + tasks[idx].h + "</div>";
                }
                e.target.value = "";
            }
        }
        show();
    </script>
</body>
</html>
